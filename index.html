<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baza Kodów</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; flex: 1; }
  .layout { display: flex; min-height: calc(100vh - 65px); }
  aside { width: 210px; background: #13151f; border-right: 1px solid #2d3748; padding: 16px; flex-shrink: 0; }
  .search-wrap { margin-bottom: 20px; }
  .search-wrap input { width: 100%; background: #1a1d2e; border: 1px solid #2d3748; border-radius: 8px; padding: 8px 10px; color: #e2e8f0; font-size: 13px; outline: none; }
  .filter-group { margin-bottom: 20px; }
  .filter-label { font-size: 11px; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .filter-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 2px; color: #a0aec0; display: flex; justify-content: space-between; align-items: center; }
  .filter-item:hover { background: #1e2230; }
  .filter-item.active { background: #2d3748; color: #a78bfa; font-weight: 600; }
  .filter-item .count { font-size: 11px; background: #2d3748; border-radius: 10px; padding: 1px 7px; }
  .filter-item.active .count { color: #a78bfa; }
  .count-info { font-size: 11px; color: #4a5568; margin-top: 8px; }
  main { flex: 1; padding: 20px; overflow-y: auto; }
  .empty { text-align: center; color: #4a5568; margin-top: 80px; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .card-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; flex-wrap: wrap; }
  .badge-event { color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .badge-event.subscribe { background: #805ad5; }
  .badge-event.add_to_cart { background: #2f855a; }
  .card-name { font-weight: 600; font-size: 15px; flex: 1; color: #fff; }
  .badge-meta { font-size: 11px; color: #718096; background: #2d3748; padding: 2px 10px; border-radius: 20px; }
  .chevron { color: #4a5568; font-size: 16px; margin-left: 4px; }
  .card-body { border-top: 1px solid #2d3748; display: none; }
  .card-body.open { display: block; }
  .note-box { margin: 12px 16px 0; background: #3b1f6e; border: 1px solid #6d28d9; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #d8b4fe; display: flex; gap: 8px; white-space: pre-wrap; }
  .desc { padding: 8px 16px; font-size: 13px; color: #a0aec0; }
  .code-toolbar { background: #161b22; border-top: 1px solid #2d3748; border-bottom: 1px solid #2d3748; padding: 6px 12px; display: flex; justify-content: flex-end; }
  .btn-copy { background: #2d3748; border: none; color: #fff; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-copy.copied { background: #276749; }
  pre { margin: 0; padding: 16px; background: #0d1117; overflow-x: auto; font-size: 13px; line-height: 1.6; font-family: monospace; }
  .kw { color: #569CD6; }
  .str { color: #CE9178; }
  .cmt { color: #6A9955; }
  .fn { color: #DCDCAA; }
</style>
</head>
<body>

<header>
  <h1>⚡ Baza Kodów</h1>
</header>

<div class="layout">
  <aside>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="🔍 Szukaj..." oninput="render()">
    </div>
    <div id="sidebar"></div>
    <div class="count-info" id="countInfo"></div>
  </aside>
  <main id="main"></main>
</div>

const DATA = [
  {"id":1,"name":"Shoper 5.0.0 - add_to_cart - product page","platform":"Shoper","eventType":"add_to_cart","formLocation":"Product page","description":"","note":"Kod dla eventu add_to_cart na stronie produktowej. Pamiętaj, aby przetestować kod w konsoli!","code":"!(function(){\n  document.querySelector('body').addEventListener('mousedown', function(e){\n    var containerName = 'buy-button';\n    var addToCartButtonName = '.product-actions__add-to-basket .btn_primary';\n    var isProductPage = true;\n    var productIdName = '';\n    var productAttributeName = '';\n    var productContainerList = document.querySelectorAll(containerName);\n    if (productContainerList.length !== 0) {\n      productContainerList.forEach(function(container, index){\n        var addToCartButton = container.querySelector(addToCartButtonName)\n        var productId = !isProductPage === true ? container.querySelector(productIdName) : null\n        if (addToCartButton) {\n          var eventPath = e.path || e.composedPath();\n          if (eventPath.includes(addToCartButton)) {\n            if (isProductPage || productId) {\n              if (!isProductPage) {\n                _edrone.product_category_ids = \"\";\n                _edrone.product_category_names = \"\";\n                _edrone.product_titles = \"\";\n                _edrone.product_urls = \"\";\n                _edrone.product_images = \"\";\n                _edrone.product_ids = productId.getAttribute(productAttributeName)\n              }\n              _edrone.action_type = 'add_to_cart';\n              _edrone.init();\n            } else {\n              console.warn('product_id selector does not exist')\n            }\n          }\n        } else {\n          console.warn('add_to_cart button does not exist')\n        }\n      });\n    } else {\n      console.warn('add_to_cart container does not exist')\n    }\n  })\n})();"},
  {"id":2,"name":"Shoper 5.0.0 - add_to_cart - category/homepage","platform":"Shoper","eventType":"add_to_cart","formLocation":"Category page","description":"","note":"Kod dla eventu add_to_cart na stronie kategorii (oraz stronie głównej). Pamiętaj, aby przetestować kod w konsoli!","code":"!(function(){\n  document.querySelector('body').addEventListener('mousedown', function(e){\n    var containerName = 'product-tile';\n    var addToCartButtonName = '.product-tile__footer-btn .btn_primary';\n    var isProductPage = false;\n    var productIdName = 'buy-button';\n    var productAttributeName = 'product-id';\n    var productContainerList = document.querySelectorAll(containerName);\n    if (productContainerList.length !== 0) {\n      productContainerList.forEach(function(container, index){\n        var addToCartButton = container.querySelector(addToCartButtonName)\n        var productId = !isProductPage === true ? container.querySelector(productIdName) : null\n        if (addToCartButton) {\n          var eventPath = e.path || e.composedPath();\n          if (eventPath.includes(addToCartButton)) {\n            if (isProductPage || productId) {\n              if (!isProductPage) {\n                _edrone.product_category_ids = \"\";\n                _edrone.product_category_names = \"\";\n                _edrone.product_titles = \"\";\n                _edrone.product_urls = \"\";\n                _edrone.product_images = \"\";\n                _edrone.product_ids = productId.getAttribute(productAttributeName)\n              }\n              _edrone.action_type = 'add_to_cart';\n              _edrone.init();\n            } else {\n              console.warn('product_id selector does not exist')\n            }\n          }\n        } else {\n          console.warn('add_to_cart button does not exist')\n        }\n      });\n    } else {\n      console.warn('add_to_cart container does not exist')\n    }\n  })\n})();"},
  {"id":3,"name":"Shoper 5.0.0 - subscribe - Order","platform":"Shoper","eventType":"subscribe","formLocation":"Order","description":"","note":"Kod dla eventu subscribe na stronie checkout'u podczas zamowienia. Pamiętaj, aby przetestować kod w konsoli!","code":"(function(){\n  document.querySelector('body').addEventListener('mousedown', function(e){\n    var emailValue = document.querySelector('.basket-module__content input[name=\"email\"]');\n    var submitButton = document.querySelector('.basket-summary__footer button[class=\"btn btn_primary btn_full-width\"]');\n    var subscriptionCheckbox = document.querySelector('#additional_newsletter')\n    var firstNameInput = document.querySelector('.basket-module__content input[name=\"firstName\"]')\n    if(firstNameInput){\n      _edrone.first_name = firstNameInput.value;\n    }\n    var lastNameInput = document.querySelector('.basket-module__content input[name=\"lastName\"]')\n    if(lastNameInput){\n      _edrone.last_name = lastNameInput.value;\n    }\n    var eventPath = e.path || e.composedPath();\n    var userAgent = navigator.userAgent;\n    if (localStorage.getItem('sub') === null) {\n      document.addEventListener(\"keydown\", event => {\n        if (event.key === \"Enter\") {\n          if (emailValue) {\n            _edrone.email = emailValue.value;\n            _edrone.action_type = 'subscribe';\n            _edrone.customer_tags = 'Order'\n            var phoneInput = document.querySelector('.basket-module__content input[name=\"phone\"]')\n            if(phoneInput){\n              _edrone.phone = phoneInput.value;\n            }\n            if(subscriptionCheckbox && subscriptionCheckbox.checked){\n              _edrone.init();\n              localStorage.setItem(\"sub\", \"1\");\n            }\n          }\n        }\n      })\n      if (eventPath.includes(submitButton)) {\n        if (emailValue) {\n          _edrone.email = emailValue.value;\n          _edrone.action_type = 'subscribe';\n          _edrone.customer_tags = 'Order'\n          var phoneInput = document.querySelector('.basket-module__content input[name=\"phone\"]')\n          if(phoneInput){\n            _edrone.phone = phoneInput.value;\n          }\n          if(subscriptionCheckbox && subscriptionCheckbox.checked){\n            _edrone.init();\n            localStorage.setItem(\"sub\", \"1\");\n          }\n        }\n      }\n    } else {\n      setTimeout(function(){\n        localStorage.removeItem('sub')},\n        5000);\n    }\n  })\n})();"},
  {"id":4,"name":"Idosell - subscribe - Footer","platform":"Idosell","eventType":"subscribe","formLocation":"Footer","description":"","note":"Pamiętaj, aby przetestować kod w konsoli! ID dla checkbox'a zazwyczaj jest takie samo, ale czasami może nieco się różnić, więc jeśli kod nie zadziała, sprawdź jakie ID ma checkbox (jeśli inne niż #newsletter_consent musisz je podmienić)","code":"(function(){\n  document.querySelector('body').addEventListener('mousedown', function(e){\n    var emailValue = document.querySelector('.newsletter_form #mailing_email');\n    var submitButton = document.querySelector('.newsletter_form #newsletter_button_add');\n    var subscriptionCheckbox = document.querySelector('.newsletter_form #newsletter_consent')\n    var firstNameInput = document.querySelector('.newsletter_form #mailing_name')\n    if(firstNameInput){\n      _edrone.first_name = firstNameInput.value;\n    }\n    var eventPath = e.path || e.composedPath();\n    var userAgent = navigator.userAgent;\n    if (localStorage.getItem('sub') === null) {\n      document.addEventListener(\"keydown\", event => {\n        if (event.key === \"Enter\") {\n          if (emailValue) {\n            _edrone.email = emailValue.value;\n            _edrone.action_type = 'subscribe';\n            _edrone.customer_tags = 'Footer'\n            if(subscriptionCheckbox && subscriptionCheckbox.checked){\n              _edrone.init();\n              localStorage.setItem(\"sub\", \"1\");\n            }\n          }\n        }\n      })\n      if (eventPath.includes(submitButton)) {\n        if (emailValue) {\n          _edrone.email = emailValue.value;\n          _edrone.action_type = 'subscribe';\n          _edrone.customer_tags = 'Footer'\n          if(subscriptionCheckbox && subscriptionCheckbox.checked){\n            _edrone.init();\n            localStorage.setItem(\"sub\", \"1\");\n          }\n        }\n      }\n    } else {\n      setTimeout(function(){\n        localStorage.removeItem('sub')},\n        5000);\n    }\n  })\n})();"},

bscriptionCheckbox && subscriptionCheckbox.checked){\n                _edrone.init();\n                localStorage.setItem(\"sub\", \"1\");\n              }\n            }\n          }\n        })\n        if (eventPath.includes(submitButton)) {\n          if (emailValue) {\n            _edrone.email = emailValue.value;\n            _edrone.action_type = 'subscribe';\n            _edrone.customer_tags = 'Register'\n            var phoneInput = document.querySelector('#client_phone')\n            if(phoneInput){\n              _edrone.phone = phoneInput.value;\n            }\n            if (smsSubscriptionCheckbox && smsSubscriptionCheckbox.checked) {\n              _edrone.sms_subscriber_status = '1'\n            }\n            if(subscriptionCheckbox && subscriptionCheckbox.checked){\n              _edrone.init();\n              localStorage.setItem(\"sub\", \"1\");\n            }\n          }\n        }\n      } else {\n        setTimeout(function(){\n          localStorage.removeItem('sub')},\n          5000);\n      }\n    })\n  })();\n}"},

const PLATFORMS = ["Wszystkie","Shoper","Idosell","WooCommerce","PrestaShop","Shopify"];
const EVENTS = ["Wszystkie","subscribe","add_to_cart"];
const LOCATIONS = ["Wszystkie","Footer","Register","Order","Product page","Category page"];

let filterPlatform = "Wszystkie", filterEvent = "Wszystkie", filterLocation = "Wszystkie";

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(code){
  return esc(code)
    .replace(/(\/\/[^\n]*)/g,'<span class="cmt">$1</span>')
    .replace(/('.*?'|".*?")/g,'<span class="str">$1</span>')
    .replace(/\b(function|const|let|var|return|if|else|document|window|addEventListener)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(gtag|fbq|console)\b/g,'<span class="fn">$1</span>');
}

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const words = q ? q.split(/\s+/) : [];
  return DATA.filter(s => {
    const mp = filterPlatform==="Wszystkie" || s.platform===filterPlatform;
    const me = filterEvent==="Wszystkie" || s.eventType===filterEvent;
    const ml = filterLocation==="Wszystkie" || s.formLocation.toLowerCase()===filterLocation.toLowerCase();
    if(!mp||!me||!ml) return false;
    if(!words.length) return true;
    const hay = [s.name,s.platform,s.eventType,s.formLocation,s.note,s.code].join(" ").toLowerCase();
    return words.every(w => hay.includes(w));
  });
}

function countFor(group, val){
  return DATA.filter(s => {
    if(group==="platform") return s.platform===val;
    if(group==="event") return s.eventType===val;
    if(group==="location") return s.formLocation.toLowerCase()===val.toLowerCase();
  }).length;
}

function renderSidebar(){
  const groups = [
    {label:"Platforma", key:"platform", opts:PLATFORMS, cur:filterPlatform, set:v=>{filterPlatform=v;render();}},
    {label:"Typ eventu", key:"event", opts:EVENTS, cur:filterEvent, set:v=>{filterEvent=v;render();}},
    {label:"Form location", key:"location", opts:LOCATIONS, cur:filterLocation, set:v=>{filterLocation=v;render();}}
  ];
  document.getElementById('sidebar').innerHTML = groups.map(g => `
    <div class="filter-group">
      <div class="filter-label">${g.label}</div>
      ${g.opts.map(o => {
        const cnt = o==="Wszystkie" ? DATA.length : countFor(g.key, o);
        return `<div class="filter-item${g.cur===o?' active':''}" onclick="setSidebar('${g.key}','${o}')">${o}<span class="count">${cnt}</span></div>`;
      }).join('')}
    </div>`).join('');
}

function setSidebar(key, val){
  if(key==="platform") filterPlatform=val;
  if(key==="event") filterEvent=val;
  if(key==="location") filterLocation=val;
  render();
}

function render(){
  renderSidebar();
  const filtered = getFiltered();
  document.getElementById('countInfo').textContent = `${filtered.length} / ${DATA.length} kodów`;
  const main = document.getElementById('main');
  if(!filtered.length){
    main.innerHTML = `<div class="empty"><div class="icon">📂</div><div>Brak kodów dla wybranych filtrów.</div></div>`;
    return;
  }
  main.innerHTML = filtered.map(s => `
    <div class="card">
      <div class="card-header" onclick="toggle(${s.id})">
        <span class="badge-event ${s.eventType}">${s.eventType}</span>
        <span class="card-name">${esc(s.name)}</span>
        <span class="badge-meta">${esc(s.platform)}</span>
        ${s.formLocation ? `<span class="badge-meta">${esc(s.formLocation)}</span>` : ''}
        <span class="chevron" id="chev${s.id}">▼</span>
      </div>
      <div class="card-body" id="body${s.id}">
        ${s.note ? `<div class="note-box">📝 <span>${esc(s.note)}</span></div>` : ''}
        ${s.description ? `<div class="desc">${esc(s.description)}</div>` : ''}
        <div class="code-toolbar">
          <button class="btn-copy" id="btn${s.id}" onclick="copyCode(${s.id})">📋 Kopiuj</button>
        </div>
        <pre>${highlight(s.code)}</pre>
      </div>
    </div>`).join('');
}

function toggle(id){
  const body = document.getElementById('body'+id);
  const chev = document.getElementById('chev'+id);
  const open = body.classList.toggle('open');
  chev.textContent = open ? '▲' : '▼';
}

function copyCode(id){
  const s = DATA.find(x => x.id===id);
  if(!s) return;
  try {
    const el = document.createElement('textarea');
    el.value = s.code; el.style.position='fixed'; el.style.opacity='0';
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el);
  } catch(e){}
  const btn = document.getElementById('btn'+id);
  btn.textContent = '✓ Skopiowano'; btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent='📋 Kopiuj'; btn.classList.remove('copied'); }, 1500);
}

render();
</script>
